version: '3.8'

services:

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: jaeger
    ports:
      - "16686:16686"   # Jaeger UI
      - "6831:6831/udp" # trace receiver
    restart: unless-stopped

  stats_service:
    build: ./stats_service
    container_name: stats_service
    ports:
      - "5001:5001"
    environment:
      - STATS_PORT=5001
      - JAEGER_HOST=jaeger
      - JAEGER_PORT=6831
      - DEBUG=false
    depends_on:
      - jaeger
    restart: unless-stopped

  main_service:
    build: ./main_service
    container_name: main_service
    ports:
      - "5000:5000"
    environment:
      - MAIN_PORT=5000
      - OLLAMA_URL=http://host.docker.internal:11434/api/generate
      - OLLAMA_MODEL=llama3.1:8b
      - STATS_URL=http://stats_service:5001/log
      - JAEGER_HOST=jaeger
      - JAEGER_PORT=6831
      - DEBUG=false
    depends_on:
      - stats_service
      - jaeger
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped